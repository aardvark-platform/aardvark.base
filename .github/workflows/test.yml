name: Test
on:
  workflow_call:
  push:
    paths:
      - 'src/**'
      - 'paket.lock'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'paket.lock'
      - '.github/workflows/test.yml'
jobs:
  codegen-check:
    name: Validate generated code
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Cache Paket
      uses: actions/cache@v4
      with:
        path: |
          ~/.nuget/packages
          paket-files
        key: ${{ runner.os }}-paket-${{ hashFiles('paket.lock') }}
        restore-keys: |
          ${{ runner.os }}-paket-

    - name: Restore
      shell: cmd
      run: .\build.cmd restore

    - name: Run forced code generation
      shell: cmd
      run: .\generate.cmd --force

    - name: Fail on generated diffs
      shell: pwsh
      run: |
        git diff --quiet -- src
        if ($LASTEXITCODE -ne 0) {
          Write-Host "Generated files are out of date:"
          git diff --name-only -- src
          exit 1
        }

  test:
    name: Test
    needs: codegen-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-latest]
        include:
          - os: ubuntu-latest
            sln: src/Aardvark.sln
          - os: windows-latest
            sln: src\Aardvark.sln
          - os: macos-15-intel
            sln: src/Aardvark.sln
          - os: macos-latest
            sln: src/Aardvark.sln
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Cache Paket
      uses: actions/cache@v4
      with:
        path: |
          ~/.nuget/packages
          paket-files
        key: ${{ runner.os }}-paket-${{ hashFiles('paket.lock') }}
        restore-keys: |
          ${{ runner.os }}-paket-

    - name: Restore Tools
      run: dotnet tool restore

    - name: Restore
      run: dotnet paket restore

    - name: Build
      run: dotnet build -c Release ${{ matrix.sln }}

    - name: Test
      run: dotnet test ${{ matrix.sln }} -c Release --no-build --nologo --logger:"console;verbosity=normal"