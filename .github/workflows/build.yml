name: Build

on:
  push:
    paths-ignore:
    - 'README.md'
    - 'docs/**'
  pull_request:
    paths-ignore:
    - 'README.md'
    - 'docs/**'

jobs:
  codegen-check:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Cache Paket
      uses: actions/cache@v4
      with:
        path: |
          ~/.nuget/packages
          paket-files
        key: ${{ runner.os }}-paket-${{ hashFiles('paket.lock') }}
        restore-keys: |
          ${{ runner.os }}-paket-

    - name: Restore
      shell: cmd
      run: .\build.cmd restore

    - name: Run forced code generation
      shell: cmd
      run: .\generate.cmd --force

    - name: Fail on generated diffs
      shell: pwsh
      run: |
        git diff --quiet -- src
        if ($LASTEXITCODE -ne 0) {
          Write-Host "Generated files are out of date:"
          git diff --name-only -- src
          exit 1
        }

  build:
    needs: codegen-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            run-build: bash ./build.sh
          - os: windows-latest
            run-build: .\build.cmd
          - os: macos-latest
            run-build: bash ./build.sh
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Cache Paket
      uses: actions/cache@v4
      with:
        path: |
          ~/.nuget/packages
          paket-files
        key: ${{ runner.os }}-paket-${{ hashFiles('paket.lock') }}
        restore-keys: |
          ${{ runner.os }}-paket-

    - name: Build
      run: ${{ matrix.run-build }}
